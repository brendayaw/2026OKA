<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Okinawa 2026 - Minimalist Trip</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --accent: #000000;
            --bg-soft: #f8f9fa;
            --text-main: #1a1a1a;
            --text-sub: #666666;
        }

        body {
            font-family: -apple-system, "Noto Sans TC", sans-serif;
            background-color: var(--bg-soft);
            color: var(--text-main);
            padding-bottom: 90px; /* 為底部導覽留白 */
        }

        /* 隱藏捲動條但保有功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 頂部標題 */
        header {
            padding: 40px 24px 20px;
            background: #ffffff;
        }

        /* 行程卡片 */
        .item-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: transform 0.2s;
        }

        .item-card:active {
            transform: scale(0.98);
        }

        /* 底部固定選單 */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 10px;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #999;
            font-size: 10px;
            text-decoration: none;
            transition: color 0.3s;
        }

        .nav-item.active {
            color: #ffffff;
        }

        .nav-item i {
            font-size: 18px;
            margin-bottom: 4px;
        }

        /* 日期標籤 */
        .date-divider {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-sub);
            margin: 24px 0 12px 4px;
            display: flex;
            align-items: center;
            letter-spacing: 1px;
        }

        .date-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #eee;
            margin-left: 12px;
        }

        /* 分類標籤 (在頂部或是卡片內) */
        .tag {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            background: #f0f0f0;
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- 頂部區塊 -->
    <header>
        <div class="flex justify-between items-end mb-2">
            <h1 class="text-3xl font-black tracking-tight">Okinawa '26</h1>
            <span class="text-xs font-bold text-gray-400">MAY 21-25</span>
        </div>
        <p class="text-gray-500 text-sm">沖繩五天四夜·極簡行程表</p>
        
        <!-- 快速搜尋 -->
        <div class="mt-6 relative">
            <input type="text" id="searchInput" placeholder="Search itinerary..." 
                   class="w-full bg-gray-100 border-none rounded-xl py-3 pl-11 pr-4 text-sm focus:ring-2 focus:ring-black">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-gray-400"></i>
        </div>
    </header>

    <!-- 行程內容區 -->
    <main class="px-5 mt-4" id="itineraryContent">
        <!-- 由 JS 動態生成內容 -->
    </main>

    <!-- 底部功能選單 -->
    <nav class="bottom-nav">
        <a href="#" class="nav-item active" onclick="filterBy('All', this)">
            <i class="fa-solid fa-house-chimney"></i>
            <span>全部</span>
        </a>
        <a href="#" class="nav-item" onclick="filterBy('景點', this)">
            <i class="fa-solid fa-camera"></i>
            <span>景點</span>
        </a>
        <a href="#" class="nav-item" onclick="filterBy('飲食', this)">
            <i class="fa-solid fa-utensils"></i>
            <span>美食</span>
        </a>
        <a href="#" class="nav-item" onclick="filterBy('住宿', this)">
            <i class="fa-solid fa-bed"></i>
            <span>住宿</span>
        </a>
        <a href="#" class="nav-item" onclick="filterBy('移動', this)">
            <i class="fa-solid fa-car"></i>
            <span>交通</span>
        </a>
    </nav>

    <script>
        const travelData = [
            { date: "MAY 21, THU", time: "11:30", type: "移動", title: "桃園機場 T1", content: "搭乘 14:45 飛往沖繩班機", note: "建議 12:00 前抵達" },
            { date: "MAY 21, THU", time: "17:20", type: "移動", title: "抵達那霸機場", content: "辦理入境並搭乘單軌電車", note: "" },
            { date: "MAY 21, THU", time: "18:30", type: "住宿", title: "ALPHABED INN", content: "國際通入口處，位置極佳", note: "辦理 Check-in" },
            { date: "MAY 21, THU", time: "19:30", type: "景點", title: "國際通散策", content: "第一晚的漫步與晚餐", note: "" },
            
            { date: "MAY 22, FRI", time: "08:00", type: "飲食", title: "第一牧志公設市場", content: "在地人的廚房，品嚐海鮮早餐", note: "" },
            { date: "MAY 22, FRI", time: "11:00", type: "移動", title: "租車出發", content: "取車後開始北上行程", note: "" },
            { date: "MAY 22, FRI", time: "13:00", type: "景點", title: "2nd STREET 浦添", content: "人氣古著二手店挖寶", note: "" },
            { date: "MAY 22, FRI", time: "15:00", type: "住宿", title: "北谷 Coldio 飯店", content: "榻榻米風格住宿", note: "" },
            { date: "MAY 22, FRI", time: "16:30", type: "飲食", title: "美濱迴轉壽司", content: "排隊名店，新鮮直送", note: "建議早點去抽號碼牌" },

            { date: "MAY 23, SAT", time: "09:00", type: "飲食", title: "客美多咖啡", content: "北谷 58 號店，悠閒早餐", note: "" },
            { date: "MAY 23, SAT", time: "11:00", type: "景點", title: "美國村", content: "美式復古街道與海濱散步", note: "" },
            { date: "MAY 23, SAT", time: "14:00", type: "景點", title: "美麗海水族館", content: "震撼的黑潮之海", note: "" }
        ];

        let activeFilter = 'All';
        let searchQuery = '';

        function render() {
            const container = document.getElementById('itineraryContent');
            const filtered = travelData.filter(item => {
                const matchType = activeFilter === 'All' || item.type === activeFilter;
                const matchSearch = item.title.includes(searchQuery) || item.content.includes(searchQuery);
                return matchType && matchSearch;
            });

            let html = "";
            let lastDate = "";

            filtered.forEach(item => {
                if (item.date !== lastDate) {
                    html += `<div class="date-divider">${item.date}</div>`;
                    lastDate = item.date;
                }

                html += `
                    <div class="item-card">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-xs font-bold text-gray-400 font-mono">${item.time}</span>
                            <span class="tag">${item.type}</span>
                        </div>
                        <h3 class="text-lg font-bold mb-1">${item.title}</h3>
                        <p class="text-sm text-gray-500 leading-snug">${item.content}</p>
                        ${item.note ? `<p class="mt-3 text-xs text-blue-500 font-medium italic">/ ${item.note}</p>` : ''}
                    </div>
                `;
            });

            container.innerHTML = html || '<div class="py-20 text-center text-gray-400 text-sm">No items found</div>';
        }

        function filterBy(type, el) {
            activeFilter = type;
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            el.classList.add('active');
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            render();
        });

        // 初始渲染
        render();
    </script>
</body>
</html>
